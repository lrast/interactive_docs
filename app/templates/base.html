<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}interactive documentation{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="page">
    <main class="page__main">
      <div class="page__main-stack">
        <div class="page__main-inner">
          {% block content %}{% endblock %}
        </div>
        <div class="page__chat-bar" aria-label="Chat">
          <div id="react-root"></div>
        </div>
      </div>
    </main>
    <aside class="page__sidebar" aria-label="Side panel">
      <section class="page__sidebar-segment page__sidebar-segment--top">
        <div id="sidebar-editor-root"></div>
        {% block sidebar_top %}{% endblock %}
      </section>
      <section class="page__sidebar-segment page__sidebar-segment--bottom">
        {% block sidebar_bottom %}{% endblock %}
      </section>
    </aside>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
